# Copy to: /etc/nginx/conf.d/acdevixa.ir.conf
# Validate with: sudo nginx -t

upstream django_backend {
    server 127.0.0.1:8077;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name acdevixa.ir;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/acdevixa.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/acdevixa.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;
    client_body_timeout 60s;
    send_timeout 60s;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";
    proxy_redirect off;

    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_intercept_errors off;

    limit_req_status 429;
    limit_conn_status 429;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/ld+json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        application/manifest+json
        application/wasm
        image/svg+xml;

    etag on;
    open_file_cache max=2000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location ^~ /static/ {
        alias /mnt/data/backend_web/static/;
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /downloads/ {
        alias /mnt/data/backend_web/downloads/;
        access_log off;
        expires -1;
        add_header Cache-Control "no-cache" always;
    }

    location ^~ /media/ {
        alias /mnt/data/backend_web/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /robots.txt {
        access_log off;
        proxy_pass http://django_backend;
    }

    location = /sitemap.xml {
        access_log off;
        proxy_pass http://django_backend;
    }

    location = /manifest.webmanifest {
        access_log off;
        proxy_pass http://django_backend;
    }

    location = /service-worker.js {
        access_log off;
        expires -1;
        add_header Cache-Control "no-cache" always;
        proxy_pass http://django_backend;
    }

    location = /health/ {
        access_log off;
        proxy_pass http://django_backend;
    }

    location ~ ^/(login|register|forgot-password|recover-password)/?$ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://django_backend;
    }

    location ^~ /oauth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://django_backend;
    }

    location ~ ^/api/(v1/account/)?(login|register|auth|token|password-reset|forgot-password|recover-password|verify)/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://django_backend;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 30;
        proxy_pass http://django_backend;
    }

    location /admin/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn conn_limit 15;
        proxy_pass http://django_backend;
    }

    location / {
        proxy_pass http://django_backend;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name acdevixa.ir;
    return 301 https://acdevixa.ir$request_uri;
}
