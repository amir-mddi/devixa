{% if messages %}
    <div class="project-global-flash project-global-flash--{{ placement|default:'page' }}" data-project-global-flash aria-live="polite" aria-atomic="true">
        {% for message in messages %}
            <div class="project-global-flash__item project-global-flash__item--{{ message.tags|default:'info' }}" role="status">
                <span class="project-global-flash__text">{{ message }}</span>
            </div>
        {% endfor %}
    </div>
{% endif %}
