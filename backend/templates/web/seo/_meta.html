{% load project_tags %}
<meta name="robots" content="{{ seo.robots }}">
<link rel="canonical" href="{{ seo.canonical_url }}">
<link rel="icon" type="image/svg+xml" href="{% project_static 'images/brand/devixa-favicon.svg' %}">
<link rel="apple-touch-icon" sizes="512x512" href="{% project_static 'images/brand/devixa-logo-512.png' %}">
<meta property="og:locale" content="{{ seo.locale }}">
<meta property="og:type" content="{{ seo.open_graph_type }}">
<meta property="og:site_name" content="{{ seo.site_name }}">
<meta property="og:title" content="{{ seo.title }}">
<meta property="og:description" content="{{ seo.description }}">
<meta property="og:url" content="{{ seo.canonical_url }}">
<meta property="og:image" content="{{ seo.image_url }}">
<meta name="twitter:card" content="{{ seo.twitter_card }}">
<meta name="twitter:title" content="{{ seo.title }}">
<meta name="twitter:description" content="{{ seo.description }}">
<meta name="twitter:image" content="{{ seo.image_url }}">
{% for schema_json in seo.structured_data_json %}
<script nonce="{{ request.csp_nonce }}" type="application/ld+json">{{ schema_json|safe }}</script>
{% endfor %}
