<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#070b14">
    <title>اتصال اینترنت در دسترس نیست | Devixa</title>
    <style>
        :root{color-scheme:dark;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#070b14;color:#f8fafc}
        *{box-sizing:border-box}
        body{min-height:100vh;margin:0;padding:24px;display:grid;place-items:center;background:radial-gradient(circle at top,#172554,#070b14 58%)}
        main{width:min(100%,520px);padding:32px;border:1px solid rgba(148,163,184,.24);border-radius:28px;background:#101827;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.34)}
        span{width:70px;height:70px;margin:0 auto 20px;display:grid;place-items:center;border-radius:22px;background:#4f7cff;font-size:34px;font-weight:900}
        h1{margin:0 0 12px;font-size:clamp(27px,7vw,40px);line-height:1.5}
        p{margin:0;color:#cbd5e1;line-height:2}
        a{min-height:46px;margin-top:24px;padding:0 20px;border:0;border-radius:15px;background:#4f7cff;color:#fff;font:inherit;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    </style>
</head>
<body>
<main>
    <span aria-hidden="true">!</span>
    <h1>اتصال اینترنت برقرار نیست</h1>
    <p>برای مشاهده دوره‌ها و ادامه مسیر یادگیری، اتصال خود را بررسی کن و دوباره تلاش کن.</p>
    <a href="/">تلاش دوباره</a>
</main>
</body>
</html>
