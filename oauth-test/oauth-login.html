<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Dealio OAuth Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 60px auto;
            padding: 20px;
        }

        button {
            display: block;
            width: 260px;
            padding: 12px;
            margin: 12px 0;
            cursor: pointer;
            font-size: 16px;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 16px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        .danger {
            color: #c00;
        }
    </style>
</head>
<body>
<h1>Dealio OAuth Login Test</h1>

<button onclick="loginWithGoogle()">Login with Google</button>
<button onclick="loginWithGitHub()">Login with GitHub</button>

<button onclick="clearTokens()">Clear Saved Tokens</button>

<h3>Status</h3>
<pre id="output">Ready...</pre>

<script>
    const BACKEND_URL = "http://localhost:8000";

    const GOOGLE_CLIENT_ID = "118576697846-gi6mnabv74beosa9npe2t0e5mq9nfm67.apps.googleusercontent.com";
    const GITHUB_CLIENT_ID = "PASTE_GITHUB_CLIENT_ID_HERE";

    const REDIRECT_URI = "http://localhost:3000/oauth/callback";

    const output = document.getElementById("output");

    function log(data) {
        if (typeof data === "string") {
            output.textContent = data;
        } else {
            output.textContent = JSON.stringify(data, null, 2);
        }
    }

    function createRandomState(provider) {
        const state = provider + "_" + crypto.randomUUID();
        localStorage.setItem("oauth_state", state);
        localStorage.setItem("oauth_provider", provider);
        return state;
    }

    function loginWithGoogle() {
        const state = createRandomState("google");

        const params = new URLSearchParams({
            client_id: GOOGLE_CLIENT_ID,
            redirect_uri: REDIRECT_URI,
            response_type: "code",
            scope: "openid email profile",
            access_type: "offline",
            prompt: "consent",
            state: state,
        });

        window.location.href =
            "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();
    }

    function loginWithGitHub() {
        const state = createRandomState("github");

        const params = new URLSearchParams({
            client_id: GITHUB_CLIENT_ID,
            redirect_uri: REDIRECT_URI,
            scope: "read:user user:email",
            state: state,
        });

        window.location.href =
            "https://github.com/login/oauth/authorize?" + params.toString();
    }

    async function handleOAuthCallback() {
        const url = new URL(window.location.href);

        const code = url.searchParams.get("code");
        const state = url.searchParams.get("state");
        const error = url.searchParams.get("error");

        if (error) {
            log({
                error: "OAuth provider returned error",
                detail: error,
            });
            return;
        }

        if (!code) {
            return;
        }

        const savedState = localStorage.getItem("oauth_state");
        const provider = localStorage.getItem("oauth_provider");

        if (!savedState || savedState !== state) {
            log({
                error: "Invalid OAuth state",
                message: "Possible CSRF or stale login attempt.",
                receivedState: state,
                savedState: savedState,
            });
            return;
        }

        if (!provider) {
            log({
                error: "Provider not found in localStorage",
            });
            return;
        }

        log(`OAuth code received from ${provider}. Sending to backend...`);

        try {
            const response = await fetch(`${BACKEND_URL}/api/v1/account/oauth/${provider}/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    code: code,
                    redirect_uri: REDIRECT_URI,
                }),
            });

            const data = await response.json();

            if (!response.ok) {
                log({
                    status: response.status,
                    error: data,
                });
                return;
            }

            localStorage.setItem("access_token", data.token);
            localStorage.setItem("refresh_token", data.refreshToken);
            localStorage.setItem("user", JSON.stringify(data.user));

            localStorage.removeItem("oauth_state");
            localStorage.removeItem("oauth_provider");

            window.history.replaceState({}, document.title, "/");

            log({
                message: "Login successful",
                user: data.user,
                token: data.token,
                refreshToken: data.refreshToken,
                expirationTime: data.expirationTime,
            });
        } catch (error) {
            log({
                error: "Backend request failed",
                detail: error.message,
            });
        }
    }

    function clearTokens() {
        localStorage.removeItem("access_token");
        localStorage.removeItem("refresh_token");
        localStorage.removeItem("user");
        localStorage.removeItem("oauth_state");
        localStorage.removeItem("oauth_provider");

        log("Tokens cleared.");
    }

    handleOAuthCallback();
</script>
</body>
</html>
