x-backend-service: &backend-service
  build:
    context: ../..
    dockerfile: deployment/Dockerfiles/DockerfileDev
  env_file:
    - ../env/development.env
  environment:
    PORT: ${PORT:-8077}
  volumes:
    - /mnt/data/backend_web/media:/app/backend/apps/media
    - /mnt/data/backend_web/static:/app/deployment/staticfiles
    - /mnt/data/backend_web/db:/app/db
    - /mnt/data/backend_web/postgresql_backup:/app/postgresql_backup
    - /mnt/data/backend_web/downloads:/app/backend/static/app/downloads
  networks:
    - backend
  restart: unless-stopped
  init: true
  stop_grace_period: 30s

x-after-bootstrap: &after-bootstrap
  depends_on:
    backend_init:
      condition: service_completed_successfully

services:
  backend_init:
    <<: *backend-service
    container_name: backend_sand_init
    restart: "no"
    command:
      - /app/deployment/entrypoints/bootstrap.sh

  backend_backend:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_application
    ports:
      - "8077:8077"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('127.0.0.1', 8077), 2).close()"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  telegram_bot:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_telegram_bot
    profiles:
      - bots
      - telegram
    command:
      - python
      - -m
      - backend.project.manage
      - telegram_polling
      - --timeout
      - "30"
      - --sleep
      - "2"

  bale_bot:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_bale_bot
    profiles:
      - bots
      - bale
    command:
      - python
      - -m
      - backend.project.manage
      - bale_polling
      - --timeout
      - "30"
      - --limit
      - "50"
      - --sleep
      - "2"

  rubika_bot:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_rubika_bot
    profiles:
      - bots
      - rubika
    command:
      - python
      - -m
      - backend.project.manage
      - rubika_polling
      - --limit
      - "50"
      - --sleep
      - "2"

  channel_sync:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_channel_sync
    profiles:
      - channel-sync
    command:
      - python
      - -m
      - backend.project.manage
      - channel_sync_polling
      - --provider
      - all
      - --telegram-timeout
      - "5"
      - --bale-timeout
      - "5"
      - --bale-limit
      - "50"
      - --sleep
      - "2"

networks:
  backend:
    external: true
