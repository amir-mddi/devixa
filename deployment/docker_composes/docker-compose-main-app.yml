x-backend-service: &backend-service
  image: ${IMAGE_NAME}
  env_file:
    - ${PROJECT_ENV_FILE}
  environment:
    VERSION: ${VERSION:-unknown}
    PORT: ${PORT:-8077}
  volumes:
    - /mnt/data/backend_web/media:/app/backend/apps/media
    - /mnt/data/backend_web/static:/app/deployment/staticfiles
    - /mnt/data/backend_web/postgresql_backup:/app/postgresql_backup
  networks:
    - backend
  restart: unless-stopped
  init: true
  stop_grace_period: 30s

x-after-bootstrap: &after-bootstrap
  depends_on:
    backend_init:
      condition: service_completed_successfully

services:
  backend_init:
    <<: *backend-service
    container_name: backend_init
    restart: "no"
    command:
      - /app/deployment/entrypoints/bootstrap.sh

  backend_backend:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_application
    ports:
      - "8077:8077"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('127.0.0.1', 8077), 2).close()"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery_worker:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_celery_worker_service
    command:
      - celery
      - -A
      - backend.project
      - worker
      - --loglevel=info
      - --queues=high_priority
      - --prefetch-multiplier=1

  celery_beat:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_celery_beat_service
    command:
      - celery
      - -A
      - backend.project
      - beat
      - --scheduler=django_celery_beat.schedulers:DatabaseScheduler
      - --max-interval=5
      - --loglevel=info

  flower:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_monitoring_flower_service
    command:
      - celery
      - -A
      - backend.project
      - flower
      - --port=5556
    ports:
      - "5556:5556"

  telegram_bot:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_telegram_bot
    profiles:
      - bots
      - telegram
    command:
      - python
      - -m
      - backend.project.manage
      - telegram_polling
      - --timeout
      - "30"
      - --sleep
      - "2"

  bale_bot:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_bale_bot
    profiles:
      - bots
      - bale
    command:
      - python
      - -m
      - backend.project.manage
      - bale_polling
      - --timeout
      - "30"
      - --limit
      - "50"
      - --sleep
      - "2"

  rubika_bot:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_rubika_bot
    profiles:
      - bots
      - rubika
    command:
      - python
      - -m
      - backend.project.manage
      - rubika_polling
      - --limit
      - "50"
      - --sleep
      - "2"

  # Run this instead of normal Telegram/Bale polling when those bot tokens are
  # dedicated to channel synchronization. Never run both update consumers for
  # the same token at the same time.
  channel_sync:
    <<:
      - *backend-service
      - *after-bootstrap
    container_name: backend_channel_sync
    profiles:
      - channel-sync
    command:
      - python
      - -m
      - backend.project.manage
      - channel_sync_polling
      - --provider
      - all
      - --telegram-timeout
      - "5"
      - --bale-timeout
      - "5"
      - --bale-limit
      - "50"
      - --sleep
      - "2"

networks:
  backend:
    external: true
