version: "3.8"

services:
  rabbitmq:
    image: docker.arvancloud.ir/library/rabbitmq:3-management
    container_name: rabbitmq_service
    hostname: rabbitmq
    restart: no
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data:
