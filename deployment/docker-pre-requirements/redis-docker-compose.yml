services:
  redis:
    container_name: redis
    image: docker.arvancloud.ir/library/redis:7
    restart: always
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--requirepass", "${REDIS_PASSWORD}"
      ]
    volumes:
      - /mnt/redis:/data
    networks:
      - backend

networks:
  backend:
    external: true